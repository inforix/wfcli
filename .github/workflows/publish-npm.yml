name: Publish To npm

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: publish-npm-main
  cancel-in-progress: false

jobs:
  build-binaries:
    if: github.actor != 'github-actions[bot]'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_binary: wfcli
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_binary: wfcli
            install_musl: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_binary: wfcli.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_binary: wfcli
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_binary: wfcli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: ${{ matrix.install_musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build target binary
        run: cargo build --release -p wfcli --target ${{ matrix.target }}

      - name: Stage binary artifact
        shell: bash
        run: |
          mkdir -p "dist/binaries/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_binary }}" "dist/binaries/${{ matrix.target }}/${{ matrix.artifact_binary }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/binaries

  publish:
    if: github.actor != 'github-actions[bot]'
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/binaries

      - name: Install npm metadata deps
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and create tag
        run: npm version patch -m "chore(release): %s [skip ci]"

      - name: Generate npm package directories
        run: ALLOW_MISSING_BINARIES=1 npm run pkg:generate-platform

      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          for dir in dist/npm/*; do
            name="$(basename "$dir")"
            if [ "$name" = "main" ]; then
              continue
            fi
            npm publish "$dir" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish dist/npm/main --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags
